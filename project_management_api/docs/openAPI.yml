openapi: 3.0.3

info:
  title: Project Management API
  version: 1.0.0
  description: API documentation for the Project Management API.

servers:
  - url: http://localhost:3000/api
  - url: https://four166-project-management-api.onrender.com/api

paths:
  /auth/signup:
    post:
      tags: [Auth]
      summary: Register a new user
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignUpRequest'
      responses:
        '201':
          description: User registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
              example:
                id: 2
                email: user5@test.com
                role: USER
        '400':
          $ref: '#/components/responses/InvalidUserInput'

  /auth/login:
    post:
      tags: [Auth]
      summary: Authenticate user
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthCredentials'
      responses:
        '200':
          description: Authentication successful
          content:
            application/json:
              schema:
                type: object
                required: [accessToken]
                properties:
                  accessToken:
                    type: string
              example:
                accessToken: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.example.token
        '400':
          $ref: '#/components/responses/InvalidUserInput'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /users:
    get:
      tags: [Users]
      summary: Get all users (admin only)
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Search'
        - $ref: '#/components/parameters/SortBy'
        - $ref: '#/components/parameters/Order'
        - $ref: '#/components/parameters/Offset'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
              example:
                - id: 1
                  email: user6@test.com
                  role: ADMIN
                - id: 2
                  email: user5@test.com
                  role: USER
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      tags: [Users]
      security: 
        - bearerAuth: []
      summary: Create a user (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
              example:
                id: 3
                email: newuser@test.com
                role: USER
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '400':
          $ref: '#/components/responses/InvalidUserInput'

  /users/{id}:
    get:
      tags: [Users]
      summary: Get user by ID
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '200':
          description: User
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
              example:
                id: 2
                email: user5@test.com
                role: USER
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Users]
      summary: Update user by ID
      security: 
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: User updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
              example:
                id: 2
                email: updateduser@test.com
                role: ADMIN
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Users]
      summary: Delete user by ID (admin only)
      security: 
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '204':
          description: User deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /projects:
    get:
      tags: [Projects]
      summary: Get all projects
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Search'
        - $ref: '#/components/parameters/SortBy'
        - $ref: '#/components/parameters/Order'
        - $ref: '#/components/parameters/Offset'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: List of projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Project'
              example:
                - id: 1
                  creatorId: 1
                  name: Admin Sample Project
                  description: Sample project primarily associated with the admin user.
                  createdAt: '2026-04-19T00:00:00.000Z'
                - id: 2
                  creatorId: 2
                  name: User Sample Project
                  description: Sample project primarily associated with the regular user.
                  createdAt: '2026-04-19T00:00:00.000Z'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [Projects]
      summary: Create project
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProjectRequest'
      responses:
        '201':
          description: Project created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
              example:
                id: 3
                creatorId: 2
                name: My Project
                description: A project for tracking work.
                createdAt: '2026-04-19T00:00:00.000Z'
        '400':
          $ref: '#/components/responses/InvalidProjectInput'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /projects/{id}:
    get:
      tags: [Projects]
      summary: Get project by ID
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '200':
          description: Project
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
              example:
                id: 1
                creatorId: 1
                name: Admin Sample Project
                description: Sample project primarily associated with the admin user.
                createdAt: '2026-04-19T00:00:00.000Z'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Projects]
      summary: Update project by ID
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProjectRequest'
      responses:
        '200':
          description: Project updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
              example:
                id: 1
                creatorId: 1
                name: Updated Project Name
                description: Updated project description.
                createdAt: '2026-04-19T00:00:00.000Z'
        '400':
          $ref: '#/components/responses/InvalidProjectInput'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Projects]
      summary: Delete project by ID (owner only)
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '204':
          description: Project deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /tasks:
    get:
      tags: [Tasks]
      summary: Get all tasks
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Search'
        - $ref: '#/components/parameters/SortBy'
        - $ref: '#/components/parameters/Order'
        - $ref: '#/components/parameters/Offset'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: List of tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Task'
              example:
                - id: 1
                  projectId: 1
                  assigneeId: 2
                  creatorId: 1
                  description: Admin-created task assigned to the regular user.
                  status: in_progress
                - id: 2
                  projectId: 2
                  assigneeId: 1
                  creatorId: 2
                  description: Regular-user-created task assigned to the admin user.
                  status: todo
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [Tasks]
      summary: Create task
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTaskRequest'
      responses:
        '201':
          description: Task created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
              example:
                id: 3
                projectId: 1
                assigneeId: 2
                creatorId: 2
                description: Review project requirements.
                status: todo
        '400':
          $ref: '#/components/responses/InvalidTaskInput'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /tasks/{id}:
    get:
      tags: [Tasks]
      summary: Get task by ID
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '200':
          description: Task
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
              example:
                id: 1
                projectId: 1
                assigneeId: 2
                creatorId: 1
                description: Admin-created task assigned to the regular user.
                status: in_progress
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Tasks]
      summary: Update task by ID
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTaskRequest'
      responses:
        '200':
          description: Task updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
              example:
                id: 1
                projectId: 1
                assigneeId: 1
                creatorId: 1
                description: Review project requirements again.
                status: in_progress
        '400':
          $ref: '#/components/responses/InvalidTaskInput'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Tasks]
      summary: Delete task by ID
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '204':
          description: Task deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /comments:
    get:
      tags: [Comments]
      summary: Get all comments
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Search'
        - $ref: '#/components/parameters/SortBy'
        - $ref: '#/components/parameters/Order'
        - $ref: '#/components/parameters/Offset'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: List of comments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Comment'
              example:
                - id: 1
                  taskId: 1
                  authorId: 2
                  content: Regular user comment on admin-owned task.
                  createdAt: '2026-04-19T00:00:00.000Z'
                - id: 2
                  taskId: 2
                  authorId: 1
                  content: Admin comment on regular user task.
                  createdAt: '2026-04-19T00:00:00.000Z'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [Comments]
      summary: Create comment
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCommentRequest'
      responses:
        '201':
          description: Comment created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Comment'
              example:
                id: 3
                taskId: 1
                authorId: 2
                content: This task looks good.
                createdAt: '2026-04-19T00:00:00.000Z'
        '400':
          $ref: '#/components/responses/InvalidCommentInput'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /comments/{id}:
    get:
      tags: [Comments]
      summary: Get comment by ID
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '200':
          description: Comment
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Comment'
              example:
                id: 1
                taskId: 1
                authorId: 2
                content: Regular user comment on admin-owned task.
                createdAt: '2026-04-19T00:00:00.000Z'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Comments]
      summary: Update comment by ID
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCommentRequest'
      responses:
        '200':
          description: Comment updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Comment'
              example:
                id: 1
                taskId: 1
                authorId: 2
                content: Updated comment text.
                createdAt: '2026-04-19T00:00:00.000Z'
        '400':
          $ref: '#/components/responses/InvalidCommentInput'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Comments]
      summary: Delete comment by ID
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '204':
          description: Comment deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    ResourceId:
      name: id
      in: path
      required: true
      description: Resource ID
      schema:
        type: integer
        minimum: 1
    Search:
      name: search
      in: query
      schema:
        type: string
    SortBy:
      name: sortBy
      in: query
      schema:
        type: string
        default: id
    Order:
      name: order
      in: query
      schema:
        type: string
        enum: [asc, desc]
        default: asc
    Offset:
      name: offset
      in: query
      schema:
        type: integer
        minimum: 0
        default: 0
    Limit:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        default: 5

  responses:
    Unauthorized:
      description: Missing or invalid bearer token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: Not authenticated. Please provide a valid token.
    Forbidden:
      description: Authenticated but insufficient permission
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: "Forbidden: insufficient permission"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: Resource not found
    InvalidUserInput:
      description: Validation failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ValidationErrorResponse'
          example:
            errors:
              - Email is not valid
              - Password must contain at least 8 characters and at most 64 characters
    InvalidProjectInput:
      description: Project validation failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ValidationErrorResponse'
          example:
            errors:
              - Project name must be between 3 and 100 characters
    InvalidTaskInput:
      description: Task validation failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ValidationErrorResponse'
          example:
            errors:
              - Project ID must be a positive integer
              - Assignee ID must be a positive integer
    InvalidCommentInput:
      description: Comment validation failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ValidationErrorResponse'
          example:
            errors:
              - Task ID must be a positive integer
              - Comment content must be between 1 and 1000 characters
    TooManyRequests:
      description: Too many login attempts
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: Too many login requests, please try again later.

  schemas:
    User:
      type: object
      required: [id, email, role]
      properties:
        id:
          type: integer
        email:
          type: string
          format: email
        role:
          type: string
          description: Role value from database
          example: USER
      example:
        id: 1
        email: user5@test.com
        role: USER

    Project:
      type: object
      required: [id, name, description]
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        createdAt:
          type: string
          format: date-time
      example:
        id: 1
        creatorId: 1
        name: User Sample Project
        description: Sample project primarily associated with the regular user.
        createdAt: '2026-04-19T00:00:00.000Z'

    Task:
      type: object
      required: [id, projectId, assigneeId, creatorId, description, status]
      properties:
        id:
          type: integer
        projectId:
          type: integer
        assigneeId:
          type: integer
        creatorId:
          type: integer
        description:
          type: string
        status:
          type: string
          enum: [todo, in_progress, done]
      example:
        id: 1
        projectId: 1
        assigneeId: 2
        creatorId: 1
        description: Admin-created task assigned to the regular user.
        status: in_progress

    Comment:
      type: object
      required: [id, taskId, authorId, content]
      properties:
        id:
          type: integer
        taskId:
          type: integer
        authorId:
          type: integer
        content:
          type: string
        createdAt:
          type: string
          format: date-time
      example:
        id: 1
        taskId: 1
        authorId: 2
        content: Regular user comment on admin-owned task.
        createdAt: '2026-04-19T00:00:00.000Z'

    AuthCredentials:
      type: object
      tags: [Auth]
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
      example:
        email: user5@test.com
        password: password5

    SignUpRequest:
      allOf:
        - $ref: '#/components/schemas/AuthCredentials'
        - type: object
          tags: [Auth]
          properties:
            role:
              type: string
              enum: [USER, ADMIN]
              description: Optional. Defaults to USER.
          example:
            email: user5@test.com
            password: password5
            role: USER

    CreateUserRequest:
      type: object
      tags: [Users]
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
        role:
          type: string
      example:
        email: newuser@test.com
        password: password123
        role: USER

    UpdateUserRequest:
      type: object
      tags: [Users]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
        role:
          type: string
      example:
        email: updateduser@test.com
        password: newpassword123
        role: ADMIN

    CreateProjectRequest:
      type: object
      tags: [Projects]
      required: [name]
      properties:
        name:
          type: string
          minLength: 3
          maxLength: 100
        description:
          type: string
          maxLength: 500
      example:
        name: My Project
        description: A project for tracking work.

    UpdateProjectRequest:
      type: object
      tags: [Projects]
      required: [name]
      properties:
        name:
          type: string
          minLength: 3
          maxLength: 100
        description:
          type: string
          maxLength: 500
      example:
        name: Updated Project Name
        description: Updated project description.

    CreateTaskRequest:
      type: object
      tags: [Tasks]
      required: [projectId, assigneeId, description]
      properties:
        projectId:
          type: integer
          minimum: 1
        assigneeId:
          type: integer
          minimum: 1
        description:
          type: string
          minLength: 1
          maxLength: 1000
        status:
          type: string
          enum: [todo, in_progress, done]
      example:
        projectId: 1
        assigneeId: 2
        description: Review project requirements.
        status: todo

    UpdateTaskRequest:
      type: object
      tags: [Tasks]
      properties:
        assigneeId:
          type: integer
          minimum: 1
        description:
          type: string
          minLength: 1
          maxLength: 1000
        status:
          type: string
          enum: [todo, in_progress, done]
      example:
        assigneeId: 1
        description: Review project requirements again.
        status: in_progress

    CreateCommentRequest:
      type: object
      tags: [Comments]
      required: [taskId, content]
      properties:
        taskId:
          type: integer
          minimum: 1
        content:
          type: string
          minLength: 1
          maxLength: 1000
      example:
        taskId: 1
        content: This task looks good.

    UpdateCommentRequest:
      type: object
      tags: [Comments]
      required: [content]
      properties:
        content:
          type: string
          minLength: 1
          maxLength: 1000
      example:
        content: Updated comment text.

    ErrorResponse:
      type: object
      tags: [Errors]
      required: [error]
      properties:
        error:
          type: string
      example:
        error: Internal Server Error

    ValidationErrorResponse:
      type: object
      tags: [Errors]
      required: [errors]
      properties:
        errors:
          type: array
          items:
            type: string
      example:
        errors:
          - Validation failed

tags:
  - name: Auth
    description: User authentication operations
  - name: Users
    description: User resource operations
  - name: Projects
    description: Project resource operations
  - name: Tasks
    description: Task resource operations
  - name: Comments
    description: Comment resource operations
  - name: Errors
    description: Standardized error responses